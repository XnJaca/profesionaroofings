services:
  - type: web
    name: professional-roofing
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node ./dist/server/entry.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: HOST
        value: 0.0.0.0
      # PORT is injected by Render automatically.
      - key: CONTACT_TO_EMAIL
        value: Proroofingdmv@gmail.com
      - key: CONTACT_FROM_EMAIL
        value: "Professional Construction <noreply@pcdmv.com>"
      - key: RESEND_API_KEY
        sync: false
